openapi: 3.0.3

info:
  title: PROG3 - Gestion des Ingrédients et Plats
  description: >
    API REST pour la gestion des ingrédients et des plats.
    Développée dans le cadre du cours PROG3 - Implémentation d'API REST
    à la Haute École d'Informatique (AA 2025-2026, Promotion K).
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Serveur de développement local

paths:

  /ingredients:
    get:
      summary: Récupérer la liste de tous les ingrédients
      description: >
        Retourne une liste d'objets JSON relatifs aux ingrédients enregistrés
        dans la base de données. Chaque objet contient : identifiant, nom,
        catégorie de l'ingrédient et prix.
      operationId: getAllIngredients
      responses:
        '200':
          description: Liste des ingrédients récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
              example:
                - id: 1
                  name: "Tomate"
                  category: "Légume"
                  price: 1.50
                - id: 2
                  name: "Farine"
                  category: "Céréale"
                  price: 0.80

  /ingredients/{id}:
    get:
      summary: Récupérer un ingrédient par son identifiant
      description: >
        Retourne un objet JSON relatif à l'ingrédient portant l'identifiant
        fourni à travers {id}. L'objet contient : identifiant, nom, catégorie
        de l'ingrédient et prix.
        Dans le cas où l'ingrédient n'est pas trouvé, retourne une réponse HTTP
        avec le code de statut 404 et un message textuel.
      operationId: getIngredientById
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'ingrédient
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ingrédient trouvé et retourné avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
              example:
                id: 1
                name: "Tomate"
                category: "Légume"
                price: 1.50
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
              example: "Ingredient.id=1 is not found"

  /ingredients/{id}/stock:
    get:
      summary: Récupérer la valeur de stock d'un ingrédient à un instant donné
      description: >
        Retourne un objet JSON relatif à la valeur de stock de l'ingrédient
        portant l'identifiant fourni à travers {id}. L'objet contient : l'unité
        (PCS, KG, L) et la valeur du stock de type nombre.
        Les paramètres de requêtes `at` et `unit` sont obligatoires pour
        déterminer à quel moment et dans quelle unité récupérer la valeur du
        stock de l'ingrédient.
        Dans le cas où l'ingrédient n'est pas trouvé, retourne un code 404.
        Dans le cas où l'un des paramètres `at` ou `unit` n'est pas fourni,
        retourne un code 400.
      operationId: getIngredientStock
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'ingrédient
          schema:
            type: integer
            format: int64
        - name: at
          in: query
          required: true
          description: >
            Date et heure temporelle pour laquelle on souhaite récupérer
            la valeur du stock. Format ISO-8601 (ex: 2024-03-31T10:00:00).
          schema:
            type: string
            format: date-time
          example: "2024-03-31T10:00:00"
        - name: unit
          in: query
          required: true
          description: >
            Unité dans laquelle la valeur du stock est exprimée.
            Valeurs acceptées : PCS, KG, L.
          schema:
            type: string
            enum:
              - PCS
              - KG
              - L
          example: "KG"
      responses:
        '200':
          description: Valeur de stock récupérée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
              example:
                unit: "KG"
                value: 15.5
        '400':
          description: >
            L'un des paramètres obligatoires `at` ou `unit` n'est pas fourni
          content:
            text/plain:
              schema:
                type: string
              example: "Either mandatory query parameter `at` or `unit` is not provided."
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
              example: "Ingredient.id=1 is not found"

  /dishes:
    get:
      summary: Récupérer la liste de tous les plats
      description: >
        Retourne une liste d'objets JSON relatifs aux plats enregistrés
        dans la base de données. Chaque objet contient : identifiant, nom,
        prix de vente et la liste des ingrédients qui le composent.
        Chaque ingrédient est composé des attributs : identifiant, nom,
        catégorie de l'ingrédient et prix.
      operationId: getAllDishes
      responses:
        '200':
          description: Liste des plats récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
              example:
                - id: 1
                  name: "Pizza Margherita"
                  sellingPrice: 12.50
                  ingredients:
                    - id: 1
                      name: "Tomate"
                      category: "Légume"
                      price: 1.50
                    - id: 3
                      name: "Mozzarella"
                      category: "Produit laitier"
                      price: 2.00

  /dishes/{id}/ingredients:
    put:
      summary: Modifier la liste des ingrédients associés à un plat
      description: >
        Permet de modifier (associer ou dissocier) une liste d'ingrédients
        au plat ayant l'identifiant {id} fourni.
        La requête doit contenir un corps obligatoire avec la liste d'objets
        JSON correspondant aux ingrédients à associer ou dissocier.
        Si des éléments des ingrédients fournis dans le corps diffèrent des
        éléments enregistrés en base de données, ces nouveaux éléments sont
        ignorés : l'endpoint ne sert qu'à associer ou dissocier et non à
        modifier les informations des ingrédients.
        Dans le cas où le corps de la requête est absent, retourne un code 400.
        Dans le cas où le plat n'est pas trouvé, retourne un code 404.
      operationId: updateDishIngredients
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant du plat
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        description: >
          Liste des ingrédients à associer ou dissocier au plat.
          Ce corps de requête est obligatoire.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
            example:
              - id: 1
                name: "Tomate"
                category: "Légume"
                price: 1.50
              - id: 3
                name: "Mozzarella"
                category: "Produit laitier"
                price: 2.00
      responses:
        '200':
          description: >
            Les ingrédients du plat ont été mis à jour avec succès.
            Retourne le plat mis à jour avec sa nouvelle liste d'ingrédients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
              example:
                id: 1
                name: "Pizza Margherita"
                sellingPrice: 12.50
                ingredients:
                  - id: 1
                    name: "Tomate"
                    category: "Légume"
                    price: 1.50
                  - id: 3
                    name: "Mozzarella"
                    category: "Produit laitier"
                    price: 2.00
        '400':
          description: Le corps de la requête est absent ou invalide
          content:
            text/plain:
              schema:
                type: string
              example: "Request body is mandatory and must contain a list of ingredients."
        '404':
          description: Plat non trouvé
          content:
            text/plain:
              schema:
                type: string
              example: "Dish.id=1 is not found"

components:
  schemas:

    Ingredient:
      type: object
      description: Représentation d'un ingrédient
      properties:
        id:
          type: integer
          format: int32
          description: Identifiant unique de l'ingrédient
          example: 1
        name:
          type: string
          description: Nom de l'ingrédient
          example: "Tomate"
        category:
          type: string
          description: Catégorie de l'ingrédient
          example: "Légume"
        price:
          type: number
          format: double
          description: Prix unitaire de l'ingrédient
          example: 1.50

    StockValue:
      type: object
      description: Valeur de stock d'un ingrédient à un instant donné
      properties:
        unit:
          type: string
          description: Unité de mesure du stock
          enum:
            - PCS
            - KG
            - L
          example: "KG"
        value:
          type: number
          format: double
          description: Quantité en stock exprimée dans l'unité donnée
          example: 15.5

    Dish:
      type: object
      description: Représentation d'un plat
      properties:
        id:
          type: integer
          format: int32
          description: Identifiant unique du plat
          example: 1
        name:
          type: string
          description: Nom du plat
          example: "Pizza Margherita"
        sellingPrice:
          type: number
          format: double
          description: Prix de vente du plat
          example: 12.50
        ingredients:
          type: array
          description: Liste des ingrédients composant le plat
          items:
            $ref: '#/components/schemas/Ingredient'
